<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAT PoW Miner - BSC</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.4/dist/ethers.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', monospace;
  background: #0a0e17;
  color: #c8d6e5;
  padding: 20px;
  min-height: 100vh;
}
#app { max-width: 960px; margin: 0 auto; }
h1 { color: #f5a623; text-align: center; margin-bottom: 4px; font-size: 1.6em; }
.subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 0.85em; }
h2 { color: #3498db; margin-bottom: 12px; font-size: 1.1em; border-bottom: 1px solid #1a2332; padding-bottom: 6px; }
#config-panel, #status-panel, #log-panel, #controls {
  background: #111827;
  border: 1px solid #1e2d3d;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 14px;
}
.field { margin-bottom: 10px; }
.field label { display: block; color: #8899aa; font-size: 0.82em; margin-bottom: 3px; }
.field input[type="text"], .field input[type="password"], .field input[type="number"],
.field textarea, .field select {
  width: 100%;
  background: #0d1117;
  border: 1px solid #2a3a4a;
  border-radius: 4px;
  color: #e0e0e0;
  padding: 7px 10px;
  font-family: inherit;
  font-size: 0.9em;
}
.field small { color: #556; font-size: 0.75em; }
.field-row { display: flex; gap: 12px; flex-wrap: wrap; }
.field-row .field { flex: 1; min-width: 140px; }
.field input[type="checkbox"] { margin-right: 4px; }
#status-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.stat {
  background: #0d1117;
  border: 1px solid #1e2d3d;
  border-radius: 6px;
  padding: 10px;
  display: flex;
  flex-direction: column;
}
.stat-label { color: #7f8c8d; font-size: 0.75em; text-transform: uppercase; }
.stat-val { color: #2ecc71; font-size: 1.05em; margin-top: 2px; word-break: break-all; }
#controls { display: flex; gap: 10px; justify-content: center; }
button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 10px 32px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 1em;
  font-family: inherit;
  transition: background 0.2s;
}
button:hover { background: #1d4ed8; }
button:disabled { background: #333; color: #666; cursor: not-allowed; }
#btnStop { background: #dc2626; }
#btnStop:hover:not(:disabled) { background: #b91c1c; }
.btn-small { padding: 3px 10px; font-size: 0.75em; background: #374151; }
.btn-small:hover { background: #4b5563; }
#logArea {
  background: #000;
  border: 1px solid #1e2d3d;
  border-radius: 4px;
  padding: 10px;
  height: 400px;
  overflow-y: auto;
  font-size: 0.82em;
  line-height: 1.5;
}
.log-INFO { color: #c8d6e5; }
.log-OK { color: #2ecc71; }
.log-WARN { color: #f39c12; }
.log-ERROR { color: #e74c3c; }
.log-HASH { color: #00bcd4; }
.log-MINE { color: #e056fd; }
</style>
</head>
<body>
<div id="app">
  <h1>SAT (Satoshi) PoW Miner</h1>
  <p class="subtitle">合约: 0x14Dc...906a0 | BSC Mainnet</p>

  <!-- Config Panel -->
  <div id="config-panel">
    <h2>配置</h2>
    <!-- WALLET CONFIG -->
    <div class="field">
      <label>私钥 (Private Key)</label>
      <input type="password" id="privateKey" placeholder="0x... (64位十六进制)">
      <small>支持多个私钥，每行一个</small>
      <textarea id="privateKeys" rows="3" placeholder="多钱包轮换模式 (每行一个私钥, 可选)"></textarea>
    </div>
    <!-- RPC CONFIG -->
    <div class="field">
      <label>RPC 节点</label>
      <select id="rpcSelect">
        <option value="https://1rpc.io/bnb">1rpc.io/bnb</option>
        <option value="https://binance.nodereal.io">binance.nodereal.io</option>
        <option value="https://bsc-mainnet.public.blastapi.io">blastapi.io</option>
        <option value="custom">自定义...</option>
      </select>
      <input type="text" id="rpcCustom" placeholder="自定义 RPC URL" style="display:none">
    </div>
    <!-- GAS CONFIG -->
    <div class="field-row">
      <div class="field">
        <label>跟随网络 Gas</label>
        <input type="checkbox" id="useNetworkGas" checked>
      </div>
      <div class="field">
        <label>Gas 倍数</label>
        <input type="number" id="gasMultiplier" value="1.0" step="0.1" min="0.1">
      </div>
      <div class="field">
        <label>Gas 下限 (Gwei)</label>
        <input type="number" id="minGas" value="0.01" step="0.01">
      </div>
      <div class="field">
        <label>Gas 上限 (Gwei)</label>
        <input type="number" id="maxGas" value="5" step="0.1">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>固定 Gas (Gwei)</label>
        <input type="number" id="fixedGas" value="1" step="0.1">
      </div>
      <div class="field">
        <label>Gas Limit</label>
        <input type="number" id="gasLimit" value="200000">
      </div>
      <div class="field">
        <label>省钱阈值 (Gwei, 0=关)</label>
        <input type="number" id="mineOnlyBelow" value="0.1" step="0.01">
      </div>
      <div class="field">
        <label>Gas 重查间隔 (秒)</label>
        <input type="number" id="gasRecheckSecs" value="15">
      </div>
    </div>
    <!-- MINING CONFIG -->
    <div class="field-row">
      <div class="field">
        <label>挖矿线程数</label>
        <input type="number" id="workers" value="4" min="1" max="32">
        <small>建议: navigator.hardwareConcurrency = <span id="hwThreads"></span></small>
      </div>
      <div class="field">
        <label>日志间隔 (秒)</label>
        <input type="number" id="logInterval" value="10" min="1">
      </div>
      <div class="field">
        <label>挑战检查间隔 (秒)</label>
        <input type="number" id="challengeCheckSecs" value="12" min="3">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label><input type="checkbox" id="simulateBefore" checked> 提交前模拟 (省 gas)</label>
      </div>
      <div class="field">
        <label><input type="checkbox" id="autoRestart" checked> 自动重启挖矿</label>
      </div>
    </div>
  </div>

  <!-- Status Panel -->
  <div id="status-panel">
    <h2>状态</h2>
    <div id="status-grid">
      <div class="stat"><span class="stat-label">钱包</span><span id="s-wallet" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">BNB</span><span id="s-bnb" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">SAT</span><span id="s-sat" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">Epoch</span><span id="s-epoch" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">难度</span><span id="s-diff" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">奖励</span><span id="s-reward" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">已铸造</span><span id="s-minted" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">算力</span><span id="s-hashrate" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">轮次</span><span id="s-round" class="stat-val">-</span></div>
      <div class="stat"><span class="stat-label">成功挖矿</span><span id="s-mined" class="stat-val">0</span></div>
      <div class="stat"><span class="stat-label">跳过(省gas)</span><span id="s-skipped" class="stat-val">0</span></div>
      <div class="stat"><span class="stat-label">总哈希</span><span id="s-totalHash" class="stat-val">0</span></div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="btnStart" onclick="startMining()">开始挖矿</button>
    <button id="btnStop" onclick="stopMining()" disabled>停止</button>
  </div>

  <!-- Log -->
  <div id="log-panel">
    <h2>日志 <button onclick="document.getElementById('logArea').innerHTML=''" class="btn-small">清空</button></h2>
    <div id="logArea"></div>
  </div>
</div>

<script>
// === CONSTANTS ===
const CONTRACT_ADDRESS = "0x14Dc4b4929c664534f1d4D64107d8F36CbF906a0";
const CHAIN_ID = 56;
const ABI = [
  "function challengeNumber() view returns (bytes32)",
  "function miningTarget() view returns (uint256)",
  "function getMiningDifficulty() view returns (uint256)",
  "function getMiningReward() view returns (uint256)",
  "function epochCount() view returns (uint256)",
  "function tokensMinted() view returns (uint256)",
  "function balanceOf(address) view returns (uint256)",
  "function mint(uint256 nonce, bytes32 challengeDigest) returns (bool)",
];

// === STATE ===
let mining = false;
let workers = [];
let roundNum = 0;
let totalMined = 0;
let totalSkipped = 0;
let totalHashes = 0;
let globalStart = 0;
let currentProvider = null;
let currentContract = null;
let accounts = [];

document.getElementById('hwThreads').textContent = navigator.hardwareConcurrency || '?';

// === LOGGING ===
function log(msg, level = 'INFO') {
  const ts = new Date().toLocaleTimeString('en-US', {hour12:false});
  const el = document.getElementById('logArea');
  const line = document.createElement('div');
  line.className = 'log-' + level;
  line.textContent = `[${ts}] [${level.padStart(5)}] ${msg}`;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

// === HELPERS ===
function fmtHashrate(rate) {
  if (rate >= 1e6) return (rate/1e6).toFixed(2) + ' MH/s';
  if (rate >= 1e3) return (rate/1e3).toFixed(2) + ' KH/s';
  return rate.toFixed(0) + ' H/s';
}

function normKey(k) {
  k = k.trim();
  return k.startsWith('0x') ? k : '0x' + k;
}

function getConfig() {
  const pk = document.getElementById('privateKey').value.trim();
  const pks = document.getElementById('privateKeys').value.trim();
  let keys = [];
  if (pks) {
    keys = pks.split('\n').map(s => s.trim()).filter(Boolean).map(normKey);
  }
  if (keys.length === 0 && pk) {
    keys = [normKey(pk)];
  }
  if (keys.length === 0) {
    throw new Error('请填写至少一个私钥');
  }

  const rpcSel = document.getElementById('rpcSelect').value;
  const rpcUrl = rpcSel === 'custom' ? document.getElementById('rpcCustom').value.trim() : rpcSel;

  return {
    keys,
    rpcUrl,
    useNetworkGas: document.getElementById('useNetworkGas').checked,
    gasMultiplier: parseFloat(document.getElementById('gasMultiplier').value) || 1.0,
    minGas: parseFloat(document.getElementById('minGas').value) || 0.01,
    maxGas: parseFloat(document.getElementById('maxGas').value) || 5,
    fixedGas: parseFloat(document.getElementById('fixedGas').value) || 1,
    gasLimit: parseInt(document.getElementById('gasLimit').value) || 200000,
    mineOnlyBelow: parseFloat(document.getElementById('mineOnlyBelow').value) || 0,
    gasRecheckSecs: parseInt(document.getElementById('gasRecheckSecs').value) || 15,
    numWorkers: parseInt(document.getElementById('workers').value) || 4,
    logInterval: parseInt(document.getElementById('logInterval').value) || 10,
    challengeCheckSecs: parseInt(document.getElementById('challengeCheckSecs').value) || 12,
    simulateBefore: document.getElementById('simulateBefore').checked,
    autoRestart: document.getElementById('autoRestart').checked,
  };
}

// === RPC CONNECT ===
async function connect(cfg) {
  const provider = new ethers.JsonRpcProvider(cfg.rpcUrl, CHAIN_ID);
  try {
    const bn = await provider.getBlockNumber();
    log(`已连接 RPC: ${cfg.rpcUrl}  最新区块: ${bn}`);
  } catch(e) {
    throw new Error(`无法连接 RPC: ${cfg.rpcUrl} - ${e.message}`);
  }
  const wallets = cfg.keys.map(k => new ethers.Wallet(k, provider));
  const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);
  return { provider, wallets, contract };
}

// === STATUS ===
async function showStatus(provider, contract, addr) {
  try {
    const [epoch, diff, reward, minted, satBal, bnbBal] = await Promise.all([
      contract.epochCount(),
      contract.getMiningDifficulty(),
      contract.getMiningReward(),
      contract.tokensMinted(),
      contract.balanceOf(addr),
      provider.getBalance(addr),
    ]);
    const set = (id, v) => document.getElementById(id).textContent = v;
    set('s-wallet', addr.slice(0,10) + '...' + addr.slice(-6));
    set('s-bnb', ethers.formatEther(bnbBal) + ' BNB');
    set('s-sat', ethers.formatEther(satBal) + ' SAT');
    set('s-epoch', epoch.toString());
    set('s-diff', diff.toString());
    set('s-reward', ethers.formatEther(reward) + ' SAT');
    set('s-minted', ethers.formatEther(minted) + ' / 21,000,000');
    log(`Epoch: ${epoch}  难度: ${diff}  奖励: ${ethers.formatEther(reward)} SAT`);
    log(`余额: ${ethers.formatEther(bnbBal)} BNB | ${ethers.formatEther(satBal)} SAT`, 'OK');
    return bnbBal;
  } catch(e) {
    log(`读取链上状态失败: ${e.message}`, 'WARN');
    return 0n;
  }
}

// === GAS ===
async function getGasPrice(provider, cfg) {
  let netGwei = null;
  try {
    const fp = await provider.getFeeData();
    if (fp.gasPrice) netGwei = parseFloat(ethers.formatUnits(fp.gasPrice, 'gwei'));
  } catch(e) {}
  if (cfg.useNetworkGas && netGwei !== null) {
    let g = netGwei * cfg.gasMultiplier;
    g = Math.max(cfg.minGas, Math.min(g, cfg.maxGas));
    return { gasGwei: g, netGwei };
  }
  return { gasGwei: cfg.fixedGas, netGwei };
}

async function waitForCheapGas(provider, cfg) {
  if (cfg.mineOnlyBelow <= 0) return true;
  let waited = false;
  while (mining) {
    const { netGwei } = await getGasPrice(provider, cfg);
    if (netGwei === null || netGwei <= cfg.mineOnlyBelow) {
      if (waited && netGwei !== null) log(`网络 gas 回落到 ${netGwei.toFixed(3)} Gwei, 恢复挖矿`, 'OK');
      return true;
    }
    if (!waited) {
      log(`网络 gas ${netGwei.toFixed(3)} Gwei > 阈值 ${cfg.mineOnlyBelow} Gwei, 暂停省钱...`, 'WARN');
      waited = true;
    }
    await new Promise(r => setTimeout(r, cfg.gasRecheckSecs * 1000));
  }
  return false;
}

// === WEB WORKER for PoW ===
function createWorkerBlob() {
  const code = `
    self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/js-sha3/0.9.3/sha3.min.js');
    self.onmessage = function(e) {
      const { wid, numWorkers, prefixHex, targetHex, baseNonce } = e.data;
      const prefix = hexToBytes(prefixHex);
      const target = BigInt('0x' + targetHex);
      let nonce = BigInt(baseNonce) + BigInt(wid);
      const step = BigInt(numWorkers);
      let count = 0;
      const BATCH = 4096;

      while (true) {
        for (let i = 0; i < BATCH; i++) {
          const nonceBytes = bigintToBytes32(nonce);
          const data = new Uint8Array(prefix.length + 32);
          data.set(prefix, 0);
          data.set(nonceBytes, prefix.length);
          const hash = self.sha3_256(data);  // returns hex string
          const hashBig = BigInt('0x' + hash);
          if (hashBig <= target) {
            self.postMessage({ type: 'found', nonce: nonce.toString(), digest: '0x' + hash, count });
            return;
          }
          nonce += step;
          count++;
        }
        self.postMessage({ type: 'progress', count });
        count = 0;
      }
    };

    function hexToBytes(hex) {
      if (hex.startsWith('0x')) hex = hex.slice(2);
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2) bytes[i/2] = parseInt(hex.substr(i, 2), 16);
      return bytes;
    }

    function bigintToBytes32(n) {
      const hex = n.toString(16).padStart(64, '0');
      return hexToBytes(hex);
    }
  `;
  return URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
}

// === KECCAK256 CHECK (ethers uses keccak256) ===
// The contract uses solidityPacked keccak256(challenge + address + nonce)
// BUT: looking at the Python code, it does keccak256(challenge + addr_bytes + nonce_32bytes)
// We need to match the same hash algorithm. The Python uses pycryptodome keccak (= Ethereum keccak256).
// sha3_256 in js-sha3 lib is actually NIST SHA3, NOT keccak256!
// We need to use keccak_256 from js-sha3 instead.

function createWorkerBlobKeccak() {
  const code = `
    self.importScripts('https://cdnjs.cloudflare.com/ajax/libs/js-sha3/0.9.3/sha3.min.js');
    self.onmessage = function(e) {
      const { wid, numWorkers, prefixHex, targetHex, baseNonce } = e.data;
      const prefix = hexToBytes(prefixHex);
      const target = BigInt('0x' + targetHex);
      let nonce = BigInt(baseNonce) + BigInt(wid);
      const step = BigInt(numWorkers);
      let count = 0;
      const BATCH = 4096;

      while (true) {
        for (let i = 0; i < BATCH; i++) {
          const nonceBytes = bigintToBytes32(nonce);
          const data = new Uint8Array(prefix.length + 32);
          data.set(prefix, 0);
          data.set(nonceBytes, prefix.length);
          const hash = self.keccak_256(data);  // keccak256, same as Ethereum
          const hashBig = BigInt('0x' + hash);
          if (hashBig <= target) {
            self.postMessage({ type: 'found', nonce: nonce.toString(), digest: '0x' + hash, count });
            return;
          }
          nonce += step;
          count++;
        }
        self.postMessage({ type: 'progress', count });
        count = 0;
      }
    };

    function hexToBytes(hex) {
      if (hex.startsWith('0x')) hex = hex.slice(2);
      const bytes = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2) bytes[i/2] = parseInt(hex.substr(i, 2), 16);
      return bytes;
    }

    function bigintToBytes32(n) {
      const hex = n.toString(16).padStart(64, '0');
      return hexToBytes(hex);
    }
  `;
  return URL.createObjectURL(new Blob([code], { type: 'application/javascript' }));
}

const workerBlobUrl = createWorkerBlobKeccak();

// === MINING ROUND ===
function mineRound(cfg, prefixHex, targetHex) {
  return new Promise((resolve) => {
    const numWorkers = cfg.numWorkers;
    const baseNonce = BigInt('0x' + Array.from(crypto.getRandomValues(new Uint8Array(8))).map(b=>b.toString(16).padStart(2,'0')).join(''));
    let hashes = 0;
    let resolved = false;
    const activeWorkers = [];

    for (let wid = 0; wid < numWorkers; wid++) {
      const w = new Worker(workerBlobUrl);
      activeWorkers.push(w);
      w.onmessage = (e) => {
        if (resolved) return;
        if (e.data.type === 'progress') {
          hashes += e.data.count;
        } else if (e.data.type === 'found') {
          hashes += e.data.count;
          resolved = true;
          activeWorkers.forEach(wk => wk.terminate());
          workers = [];
          resolve({ found: { nonce: e.data.nonce, digest: e.data.digest }, hashes });
        }
      };
      w.postMessage({
        wid,
        numWorkers,
        prefixHex,
        targetHex,
        baseNonce: baseNonce.toString(),
      });
    }
    workers = activeWorkers;

    // Periodically report progress
    const iv = setInterval(() => {
      if (resolved || !mining) {
        clearInterval(iv);
        if (!resolved && !mining) {
          activeWorkers.forEach(wk => wk.terminate());
          workers = [];
          resolve({ found: null, hashes, stopped: true });
        }
      }
    }, 500);
  });
}

// === SUBMIT MINT ===
async function submitMint(provider, contract, wallet, cfg, nonceVal, digest, gasGwei) {
  const addr = wallet.address;
  const connectedContract = contract.connect(wallet);

  if (cfg.simulateBefore) {
    try {
      await contract.mint.staticCall(nonceVal, digest, { from: addr });
    } catch(e) {
      log('提交前模拟检测到会失败 (已被抢先), 跳过提交 → 本轮 0 gas', 'WARN');
      return null;
    }
  }

  log(`正在构建 mint 交易... (gas: ${gasGwei.toFixed(2)} Gwei)`, 'WARN');
  const tx = await connectedContract.mint(BigInt(nonceVal), digest, {
    gasLimit: cfg.gasLimit,
    gasPrice: ethers.parseUnits(gasGwei.toFixed(4), 'gwei'),
  });

  log(`交易已发送: ${tx.hash}`);
  log('等待链上确认...', 'WARN');
  const receipt = await tx.wait();

  if (receipt.status === 1) {
    const cost = ethers.formatEther(receipt.gasUsed * ethers.parseUnits(gasGwei.toFixed(4), 'gwei'));
    log(`Mint 成功! 区块: ${receipt.blockNumber}  Gas Used: ${receipt.gasUsed}  花费: ${cost} BNB`, 'OK');
    return true;
  }
  log('Mint 交易失败 (reverted, 被他人抢先上链)', 'ERROR');
  return false;
}

// === MAIN MINING LOOP ===
async function mineLoop(cfg) {
  const { provider, wallets, contract } = await connect(cfg);
  currentProvider = provider;
  currentContract = contract;
  accounts = wallets;

  log(`钱包数量: ${wallets.length}${wallets.length > 1 ? '  (多钱包轮换)' : ''}`);
  for (let i = 0; i < wallets.length; i++) {
    const bal = await provider.getBalance(wallets[i].address);
    log(`  钱包[${i+1}] ${wallets[i].address}  ${ethers.formatEther(bal)} BNB`);
  }

  const { gasGwei: effGas, netGwei } = await getGasPrice(provider, cfg);
  if (cfg.useNetworkGas) {
    const ns = netGwei !== null ? netGwei.toFixed(3) : '?';
    log(`Gas 模式: 跟随网络 x${cfg.gasMultiplier} (下限 ${cfg.minGas} / 上限 ${cfg.maxGas} Gwei)  当前网络: ${ns} Gwei`);
  } else {
    log(`Gas 模式: 固定 ${cfg.fixedGas} Gwei`);
  }

  globalStart = Date.now();
  roundNum = 0;
  totalMined = 0;
  totalSkipped = 0;
  totalHashes = 0;

  while (mining) {
    if (!(await waitForCheapGas(provider, cfg))) break;

    roundNum++;
    const wallet = wallets[(roundNum - 1) % wallets.length];
    const addr = wallet.address;
    const { gasGwei: currentGas, netGwei: currentNet } = await getGasPrice(provider, cfg);

    log('='.repeat(55), 'MINE');
    const wtag = wallets.length > 1 ? `  钱包[${(roundNum-1)%wallets.length+1}/${wallets.length}] ${addr.slice(0,10)}...` : '';
    log(`第 ${roundNum} 轮挖矿开始  (${cfg.numWorkers} 线程)${wtag}`, 'MINE');
    log(`本轮 gas: ${currentGas.toFixed(3)} Gwei  (网络: ${currentNet !== null ? currentNet.toFixed(3) : '?'} Gwei)`, 'MINE');
    log('='.repeat(55), 'MINE');

    document.getElementById('s-round').textContent = roundNum;
    await showStatus(provider, contract, addr);

    log('获取挑战参数...');
    let challenge, target;
    try {
      [challenge, target] = await Promise.all([
        contract.challengeNumber(),
        contract.miningTarget(),
      ]);
    } catch(e) {
      log(`获取挑战参数失败: ${e.message}`, 'ERROR');
      await new Promise(r => setTimeout(r, 5000));
      continue;
    }

    log(`挑战号: ${challenge.slice(0, 38)}...`);
    log(`目标值: ${target}`);

    // prefix = challenge(bytes32) + address(20 bytes)
    const prefixHex = challenge.slice(2) + addr.slice(2).toLowerCase();
    const targetHex = target.toString(16).padStart(64, '0');

    // Start hashrate logger
    let lastLogTime = Date.now();
    let lastLogHashes = totalHashes;
    const logIv = setInterval(() => {
      const now = Date.now();
      const elapsed = (now - lastLogTime) / 1000;
      if (elapsed >= cfg.logInterval) {
        const dh = totalHashes - lastLogHashes;
        const rate = dh / elapsed;
        log(`算力: ${fmtHashrate(rate)}  总哈希: ${totalHashes}`, 'HASH');
        document.getElementById('s-hashrate').textContent = fmtHashrate(rate);
        lastLogTime = now;
        lastLogHashes = totalHashes;
      }
    }, 2000);

    // Start challenge checker
    let abandoned = false;
    const checkIv = setInterval(async () => {
      try {
        const newChallenge = await contract.challengeNumber();
        if (newChallenge !== challenge) {
          log('挑战号已更新（被他人先挖到），切换到新一轮...', 'WARN');
          abandoned = true;
          workers.forEach(w => w.terminate());
          workers = [];
        }
      } catch(e) {
        log(`检查挑战号失败: ${e.message}`, 'WARN');
      }
    }, cfg.challengeCheckSecs * 1000);

    const roundStart = Date.now();
    const result = await mineRound(cfg, prefixHex, targetHex);
    clearInterval(logIv);
    clearInterval(checkIv);

    totalHashes += result.hashes;
    document.getElementById('s-totalHash').textContent = totalHashes.toLocaleString();

    if (result.found && mining && !abandoned) {
      const elapsed = (Date.now() - roundStart) / 1000;
      const rate = result.hashes / elapsed;
      log('*'.repeat(55), 'OK');
      log('找到有效解!', 'OK');
      log(`  Nonce   : ${result.found.nonce}`, 'OK');
      log(`  Digest  : ${result.found.digest}`, 'OK');
      log(`  本轮哈希: ${result.hashes}`, 'OK');
      log(`  耗时    : ${elapsed.toFixed(1)}s`, 'OK');
      log(`  本轮算力: ${fmtHashrate(rate)}`, 'OK');
      log('*'.repeat(55), 'OK');

      try {
        const ok = await submitMint(provider, contract, wallet, cfg, result.found.nonce, result.found.digest, currentGas);
        if (ok === true) {
          totalMined++;
          document.getElementById('s-mined').textContent = totalMined;
          await showStatus(provider, contract, addr);
          if (!cfg.autoRestart) {
            log('auto_restart 已关闭，退出。');
            break;
          }
          log('自动重新开始挖矿...', 'MINE');
        } else if (ok === null) {
          totalSkipped++;
          document.getElementById('s-skipped').textContent = totalSkipped;
          log('本轮被抢先但已跳过提交 (0 gas)，进入下一轮', 'MINE');
        } else {
          log('本轮失败 (被抢先, 已付 gas)，直接进入下一轮', 'WARN');
          await new Promise(r => setTimeout(r, 2000));
        }
      } catch(e) {
        log(`提交交易异常: ${e.message}`, 'ERROR');
      }
    } else if (abandoned) {
      // just continue to next round
    } else if (!mining) {
      break;
    }
  }

  log('挖矿程序已退出。');
  mining = false;
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
}

// === START / STOP ===
async function startMining() {
  let cfg;
  try {
    cfg = getConfig();
  } catch(e) {
    log(e.message, 'ERROR');
    return;
  }

  mining = true;
  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;

  log('='.repeat(55), 'MINE');
  log('  SAT (Satoshi) PoW 浏览器自动挖矿程序', 'MINE');
  log('  合约: 0x14Dc...906a0  链: BSC Mainnet', 'MINE');
  log('='.repeat(55), 'MINE');

  try {
    await mineLoop(cfg);
  } catch(e) {
    log(`致命错误: ${e.message}`, 'ERROR');
    stopMining();
  }
}

function stopMining() {
  if (!mining) return;
  log('收到停止信号，正在停止...', 'WARN');
  mining = false;
  workers.forEach(w => w.terminate());
  workers = [];
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
}

// === UI EVENTS ===
document.getElementById('rpcSelect').addEventListener('change', function() {
  document.getElementById('rpcCustom').style.display = this.value === 'custom' ? 'block' : 'none';
});
</script>
