<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satoshi (SAT) - PoW 挖矿终端</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0c;--bg2:#111116;--bg3:#18181f;--bg4:#1e1e28;
  --amber:#f0a500;--amber2:#d4940a;--amber-glow:rgba(240,165,0,.15);
  --green:#00e676;--red:#ff3d3d;--dim:#555568;--text:#c8c8d4;
  --font-mono:'JetBrains Mono',monospace;--font-display:'Orbitron',sans-serif;
}
html{font-size:14px;background:var(--bg);color:var(--text);font-family:var(--font-mono)}
body{min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.008) 2px,rgba(255,255,255,.008) 4px);pointer-events:none;z-index:9999}

/* Layout */
.shell{max-width:920px;margin:0 auto;padding:20px 16px 40px}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid rgba(240,165,0,.12);margin-bottom:24px;flex-wrap:wrap;gap:12px}
.logo{font-family:var(--font-display);font-size:1.5rem;font-weight:800;letter-spacing:3px;color:var(--amber);text-shadow:0 0 20px rgba(240,165,0,.3)}
.logo span{color:var(--dim);font-weight:400;font-size:.7rem;letter-spacing:1px;display:block;margin-top:2px;font-family:var(--font-mono)}

/* Connect button */
.btn-connect{background:transparent;border:1px solid var(--amber);color:var(--amber);font-family:var(--font-mono);font-size:.8rem;padding:8px 20px;cursor:pointer;letter-spacing:1px;transition:all .2s;position:relative;overflow:hidden}
.btn-connect:hover{background:var(--amber);color:var(--bg);box-shadow:0 0 20px rgba(240,165,0,.3)}
.btn-connect.connected{border-color:var(--green);color:var(--green)}
.btn-connect.connected:hover{background:var(--green);color:var(--bg)}
.wallet-info{font-size:.75rem;color:var(--dim);text-align:right}
.wallet-info .addr{color:var(--text);font-size:.8rem}
.wallet-info .bal{color:var(--amber);font-size:.85rem;font-weight:600}

/* Panels */
.panel{background:var(--bg2);border:1px solid rgba(255,255,255,.04);padding:20px;margin-bottom:16px;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--amber);opacity:.4}
.panel-title{font-family:var(--font-display);font-size:.65rem;letter-spacing:3px;color:var(--amber2);margin-bottom:16px;text-transform:uppercase}

/* Data grid */
.data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.data-cell{padding:10px 12px;background:var(--bg3);border-left:2px solid rgba(240,165,0,.1)}
.data-cell .label{font-size:.6rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.data-cell .value{font-size:1rem;font-weight:600;color:var(--text);word-break:break-all}
.data-cell .value.amber{color:var(--amber)}
.data-cell .value.green{color:var(--green)}

/* Mining button */
.mine-section{text-align:center;padding:28px 0}
.btn-mine{font-family:var(--font-display);font-size:1rem;letter-spacing:4px;padding:16px 48px;border:2px solid var(--amber);background:transparent;color:var(--amber);cursor:pointer;transition:all .3s;position:relative;text-transform:uppercase;font-weight:700}
.btn-mine:hover{background:rgba(240,165,0,.08);box-shadow:0 0 30px rgba(240,165,0,.15)}
.btn-mine:disabled{opacity:.3;cursor:not-allowed}
.btn-mine.mining{border-color:var(--red);color:var(--red);animation:pulse-red 2s infinite}
.btn-mine.mining:hover{background:rgba(255,61,61,.08);box-shadow:0 0 30px rgba(255,61,61,.15)}
@keyframes pulse-red{0%,100%{box-shadow:0 0 5px rgba(255,61,61,.1)}50%{box-shadow:0 0 25px rgba(255,61,61,.25)}}

/* Hash visualization */
.hash-viz{margin:16px 0;height:36px;background:var(--bg3);overflow:hidden;position:relative;font-size:.65rem;line-height:36px;color:var(--dim);letter-spacing:1px;padding:0 12px;white-space:nowrap;text-overflow:ellipsis}
.hash-viz.active{color:var(--amber);text-shadow:0 0 6px rgba(240,165,0,.3)}
.hash-viz .found{color:var(--green);text-shadow:0 0 10px rgba(0,230,118,.4)}

/* Mining stats bar */
.stats-bar{display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin:12px 0}
.stat{text-align:center}
.stat .s-val{font-family:var(--font-display);font-size:1.2rem;color:var(--amber);font-weight:600}
.stat .s-label{font-size:.55rem;color:var(--dim);letter-spacing:2px;margin-top:2px;text-transform:uppercase}

/* Log */
.log-panel{background:var(--bg2);border:1px solid rgba(255,255,255,.04);position:relative}
.log-panel::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--amber);opacity:.2}
.log-header{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center}
.log-header span{font-family:var(--font-display);font-size:.6rem;letter-spacing:3px;color:var(--amber2);text-transform:uppercase}
.log-clear{font-size:.65rem;color:var(--dim);background:none;border:none;cursor:pointer;font-family:var(--font-mono)}
.log-clear:hover{color:var(--text)}
.log-body{height:200px;overflow-y:auto;padding:8px 16px;font-size:.72rem;line-height:1.7}
.log-body::-webkit-scrollbar{width:4px}
.log-body::-webkit-scrollbar-track{background:var(--bg3)}
.log-body::-webkit-scrollbar-thumb{background:var(--amber2);border-radius:2px}
.log-line{opacity:0;animation:fadeIn .3s forwards}
@keyframes fadeIn{to{opacity:1}}
.log-line .time{color:var(--dim)}
.log-line.info .msg{color:var(--text)}
.log-line.success .msg{color:var(--green)}
.log-line.error .msg{color:var(--red)}
.log-line.warn .msg{color:var(--amber)}
.log-line.hash .msg{color:var(--dim);font-size:.65rem}

/* Responsive */
@media(max-width:600px){
  .header{flex-direction:column;align-items:flex-start}
  .wallet-info{text-align:left}
  .data-grid{grid-template-columns:repeat(2,1fr)}
  .btn-mine{padding:14px 32px;font-size:.85rem}
  .stats-bar{gap:16px}
  .log-body{height:160px}
}

/* Noise overlay */
body::after{content:'';position:fixed;inset:0;opacity:.03;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");pointer-events:none;z-index:9998}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="logo">SATOSHI<span>PoW 挖矿终端 · BSC</span></div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="wallet-info" id="walletInfo" style="display:none">
        <div class="addr" id="addrDisplay"></div>
        <div class="bal" id="balDisplay">0 SAT</div>
      </div>
      <button class="btn-connect" id="btnConnect" onclick="connectWallet()">连接钱包</button>
    </div>
  </div>

  <div class="panel">
    <div class="panel-title">链上参数</div>
    <div class="data-grid">
      <div class="data-cell"><div class="label">Epoch</div><div class="value" id="vEpoch">--</div></div>
      <div class="data-cell"><div class="label">难度</div><div class="value" id="vDiff">--</div></div>
      <div class="data-cell"><div class="label">目标</div><div class="value" id="vTarget">--</div></div>
      <div class="data-cell"><div class="label">区块奖励</div><div class="value amber" id="vReward">--</div></div>
      <div class="data-cell"><div class="label">已铸造</div><div class="value" id="vMinted">--</div></div>
      <div class="data-cell"><div class="label">最大供应</div><div class="value" id="vMax">21,000,000</div></div>
    </div>
  </div>

  <div class="mine-section">
    <div class="stats-bar" id="statsBar" style="display:none">
      <div class="stat"><div class="s-val" id="sHash">0</div><div class="s-label">哈希计数</div></div>
      <div class="stat"><div class="s-val" id="sRate">0</div><div class="s-label">H/s</div></div>
      <div class="stat"><div class="s-val" id="sTime">0s</div><div class="s-label">耗时</div></div>
    </div>
    <div class="hash-viz" id="hashViz">等待开始挖矿...</div>
    <button class="btn-mine" id="btnMine" disabled onclick="toggleMining()">开始挖矿</button>
  </div>

  <div class="log-panel">
    <div class="log-header">
      <span>运行日志</span>
      <button class="log-clear" onclick="clearLog()">清除</button>
    </div>
    <div class="log-body" id="logBody"></div>
  </div>
</div>
<script>
const CA = "0x14Dc4b4929c664534f1d4D64107d8F36CbF906a0";
const BSC_ID = "0x38";
const ABI = [
  "function challengeNumber() view returns (bytes32)",
  "function miningTarget() view returns (uint256)",
  "function getMiningDifficulty() view returns (uint256)",
  "function getMiningReward() view returns (uint256)",
  "function epochCount() view returns (uint256)",
  "function tokensMinted() view returns (uint256)",
  "function balanceOf(address) view returns (uint256)",
  "function mint(uint256 nonce, bytes32 challengeDigest) returns (bool)"
];

let provider, signer, contract, userAddr;
let mining = false, hashCount = 0, mineStart = 0, statsTimer = null;

// --- Logging ---
function log(msg, type = "info") {
  const el = document.getElementById("logBody");
  const t = new Date().toLocaleTimeString("zh-CN", {hour12:false});
  el.innerHTML += `<div class="log-line ${type}"><span class="time">[${t}]</span> <span class="msg">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}
function clearLog() { document.getElementById("logBody").innerHTML = ""; }

// --- Wallet ---
async function connectWallet() {
  if (!window.ethereum) { log("未检测到 MetaMask，请安装后重试", "error"); return; }
  try {
    // Switch to BSC
    try {
      await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: BSC_ID }] });
    } catch (e) {
      if (e.code === 4902) {
        await window.ethereum.request({ method: "wallet_addEthereumChain", params: [{
          chainId: BSC_ID, chainName: "BNB Smart Chain",
          nativeCurrency: { name: "BNB", symbol: "BNB", decimals: 18 },
          rpcUrls: ["https://bsc-dataseed1.binance.org"],
          blockExplorerUrls: ["https://bscscan.com"]
        }]});
      }
    }
    provider = new ethers.BrowserProvider(window.ethereum);
    signer = await provider.getSigner();
    userAddr = await signer.getAddress();
    contract = new ethers.Contract(CA, ABI, signer);

    document.getElementById("addrDisplay").textContent = userAddr.slice(0,6) + "..." + userAddr.slice(-4);
    document.getElementById("walletInfo").style.display = "block";
    document.getElementById("btnConnect").textContent = "已连接";
    document.getElementById("btnConnect").classList.add("connected");
    document.getElementById("btnMine").disabled = false;

    log(`钱包已连接: ${userAddr.slice(0,8)}...`, "success");
    await refreshData();
  } catch (e) { log("连接失败: " + e.message, "error"); }
}

async function refreshData() {
  try {
    const [epoch, diff, target, reward, minted, bal] = await Promise.all([
      contract.epochCount(), contract.getMiningDifficulty(), contract.miningTarget(),
      contract.getMiningReward(), contract.tokensMinted(), contract.balanceOf(userAddr)
    ]);
    document.getElementById("vEpoch").textContent = epoch.toString();
    document.getElementById("vDiff").textContent = Number(diff).toLocaleString();
    const tHex = target.toString(16);
    document.getElementById("vTarget").textContent = "0x" + tHex.slice(0,8) + "..." + tHex.slice(-4);
    document.getElementById("vReward").textContent = ethers.formatUnits(reward, 8) + " SAT";
    document.getElementById("vMinted").textContent = Number(ethers.formatUnits(minted, 8)).toLocaleString();
    document.getElementById("balDisplay").textContent = ethers.formatUnits(bal, 8) + " SAT";
  } catch (e) { log("读取链上数据失败: " + e.message, "error"); }
}

// --- Mining ---
function toggleMining() {
  if (mining) { stopMining(); } else { startMining(); }
}

function stopMining() {
  mining = false;
  clearInterval(statsTimer);
  document.getElementById("btnMine").textContent = "开始挖矿";
  document.getElementById("btnMine").classList.remove("mining");
  document.getElementById("hashViz").classList.remove("active");
  document.getElementById("hashViz").textContent = "挖矿已停止";
  log("挖矿已停止", "warn");
}

async function startMining() {
  mining = true;
  hashCount = 0;
  mineStart = Date.now();
  document.getElementById("btnMine").textContent = "停止挖矿";
  document.getElementById("btnMine").classList.add("mining");
  document.getElementById("statsBar").style.display = "flex";
  document.getElementById("hashViz").classList.add("active");
  log("开始挖矿...", "success");

  statsTimer = setInterval(updateStats, 500);

  await mineLoop();
}

function updateStats() {
  const elapsed = (Date.now() - mineStart) / 1000;
  const rate = elapsed > 0 ? Math.floor(hashCount / elapsed) : 0;
  document.getElementById("sHash").textContent = hashCount.toLocaleString();
  document.getElementById("sRate").textContent = rate.toLocaleString();
  const m = Math.floor(elapsed / 60), s = Math.floor(elapsed % 60);
  document.getElementById("sTime").textContent = m > 0 ? `${m}m${s}s` : `${s}s`;
}

async function mineLoop() {
  let challengeNumber, miningTarget;
  try {
    [challengeNumber, miningTarget] = await Promise.all([
      contract.challengeNumber(), contract.miningTarget()
    ]);
    log(`挑战号: ${challengeNumber.slice(0,18)}...`);
  } catch (e) { log("获取挑战参数失败: " + e.message, "error"); stopMining(); return; }

  // random start nonce
  const rnd = ethers.randomBytes(8);
  let nonce = BigInt("0x" + ethers.hexlify(rnd).slice(2));
  const CHUNK = 3000;
  let checkCounter = 0;

  function chunk() {
    if (!mining) return;
    for (let i = 0; i < CHUNK; i++) {
      const packed = ethers.solidityPacked(
        ["bytes32", "address", "uint256"],
        [challengeNumber, userAddr, nonce]
      );
      const digest = ethers.keccak256(packed);
      hashCount++;

      if (BigInt(digest) <= miningTarget) {
        // Found!
        document.getElementById("hashViz").innerHTML = `<span class="found">解已找到! ${digest.slice(0,24)}...</span>`;
        log(`找到有效解! Nonce: ${nonce}`, "success");
        log(`Digest: ${digest.slice(0,32)}...`, "success");
        submitSolution(nonce, digest);
        return;
      }
      nonce++;
    }

    // show latest hash
    const lastPacked = ethers.solidityPacked(["bytes32","address","uint256"],[challengeNumber,userAddr,nonce]);
    const lastDigest = ethers.keccak256(lastPacked);
    document.getElementById("hashViz").textContent = lastDigest;

    checkCounter += CHUNK;
    // re-check challenge every ~60k hashes
    if (checkCounter >= 60000) {
      checkCounter = 0;
      contract.challengeNumber().then(newCh => {
        if (newCh !== challengeNumber) {
          log("挑战号已更新（可能被他人先挖到），重新获取参数...", "warn");
          refreshData();
          mineLoop(); // restart with new challenge
        } else {
          setTimeout(chunk, 0);
        }
      }).catch(() => setTimeout(chunk, 0));
      return;
    }

    setTimeout(chunk, 0);
  }

  chunk();
}

async function submitSolution(nonce, digest) {
  mining = false;
  clearInterval(statsTimer);
  document.getElementById("btnMine").textContent = "提交中...";
  log("正在提交 mint 交易...", "warn");

  try {
    const tx = await contract.mint(nonce, digest, { gasLimit: 200000 });
    log(`交易已发送: ${tx.hash}`, "info");
    log("等待链上确认...", "info");
    const receipt = await tx.wait();
    log(`交易已确认! 区块: ${receipt.blockNumber}, Gas: ${receipt.gasUsed}`, "success");
    await refreshData();
    log("奖励已到账，可继续挖矿", "success");
  } catch (e) {
    log("Mint 交易失败: " + (e.reason || e.message), "error");
  }

  document.getElementById("btnMine").textContent = "开始挖矿";
  document.getElementById("btnMine").classList.remove("mining");
  document.getElementById("btnMine").disabled = false;
  document.getElementById("hashViz").classList.remove("active");
}

// Listen for account/chain changes
if (window.ethereum) {
  window.ethereum.on("accountsChanged", () => location.reload());
  window.ethereum.on("chainChanged", () => location.reload());
}

log("Satoshi (SAT) PoW 挖矿终端已就绪", "info");
log("合约地址: " + CA, "info");
log("请连接 MetaMask 钱包开始挖矿", "info");
</script>
</body>
</html>
